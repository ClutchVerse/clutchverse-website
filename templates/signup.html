<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Clutch Verse</title>
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-box { background: #1f2833; padding: 40px; border-radius: 8px; border: 1px solid #66fcf1; box-shadow: 0 4px 10 rgba(0,0,0,0.7); text-align: center; width: 300px; }
        h2 { color: #66fcf1; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #0b0c10; border: 1px solid #45f3ff33; color: white; border-radius: 5px; }
        .btn { background: #66fcf1; color: #0b0c10; padding: 10px; width: 97%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #45a29e; color: white; }
        a { color: #66fcf1; text-decoration: none; font-size: 14px; }
        .error { color: #ff4d4d; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="signup-box">
        <h2>Create Account</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit" class="btn">Register</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px;">Pehle se account hai? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</body>
</html>
